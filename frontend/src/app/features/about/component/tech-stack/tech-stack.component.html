<div class="mb-20">
    <h2 class="text-2xl sm:text-3xl font-bold mb-10 text-white">{{ t.t('about.tech_skills_title') }}</h2>
    <div class="flex flex-wrap justify-center gap-6">
    @for (cat of techSkills; track cat.category_en) {
        <div class="w-full sm:w-[calc(50%-12px)] lg:w-[calc(33.333%-16px)] p-5 sm:p-6 rounded-xl border border-white/5 bg-white/[0.02] hover:bg-white/[0.04] transition-all duration-300">
        <h3 class="text-sm font-bold text-blue-400 tracking-wider uppercase mb-4">
            {{ t.isEnglish() ? cat.category_en : cat.category_tr }}
        </h3>
        <div class="flex flex-wrap gap-2">
            @for (item of cat.items; track item.name) {
            <span [class]="'inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-full border transition-colors cursor-default ' + (item.level === 'core'
                    ? 'text-blue-300 bg-blue-500/10 border-blue-500/20 hover:bg-blue-500/20'
                    : item.level === 'strong'
                        ? 'text-violet-300 bg-violet-500/10 border-violet-500/20 hover:bg-violet-500/20'
                        : 'text-slate-400 bg-white/5 border-white/5 hover:bg-white/10')">
                <span [class]="'w-1.5 h-1.5 rounded-full ' + (item.level === 'core' ? 'bg-blue-400' : item.level === 'strong' ? 'bg-violet-400' : 'bg-slate-500')"></span>
                {{ item.name }}
                <span [class]="'inline-flex items-center justify-center px-2 py-[3px] rounded-full text-[8px] font-bold uppercase tracking-wider border ml-1 ' + (item.level === 'core'
                        ? 'text-blue-200 bg-blue-500/25 border-blue-400/50'
                        : item.level === 'strong'
                        ? 'text-violet-200 bg-violet-500/25 border-violet-400/50'
                        : 'text-slate-300 bg-slate-500/20 border-slate-400/40')"
                    style="line-height: 1;">
                {{ item.level }}
                </span>
            </span>
            }
        </div>
        </div>
    }
    </div>
</div>
