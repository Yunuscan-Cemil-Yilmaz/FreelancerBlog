<h2 class="text-xl font-bold text-white mb-5 group-hover:text-blue-300 transition-colors">
  {{ title() }}
</h2>

<div class="aspect-video rounded-2xl overflow-hidden mb-8 border border-white/5">
  <img [src]="imageUrl()" [alt]="imageAlt()" class="w-full h-full object-cover" />
</div>

<!-- Meta -->
<div class="flex flex-wrap items-center gap-4 mb-6">
    <div class="flex flex-wrap gap-2">
        @for (tag of tags(); track tag) {
        <span class="px-2.5 py-0.5 text-[10px] font-semibold uppercase tracking-wider text-blue-400 bg-blue-500/10 rounded-full">
            {{ tag }}
        </span>
        }
    </div>
    <span class="text-xs text-slate-500">
        {{ createdAt() }}
    </span>
    <span class="text-xs text-slate-500">
        {{ readTime() }} {{ t.t('blogs.min_read') }}</span>
</div>
