<!-- Hero Section -->
<section class="relative min-h-[90vh] flex items-center justify-center overflow-hidden">
  <!-- Animated Background -->
  <div class="absolute inset-0 bg-gradient-to-br from-[#0a0f1e] via-[#111827] to-[#0a0f1e]">
    <div class="absolute top-1/4 -left-20 w-72 h-72 bg-blue-500/10 rounded-full blur-3xl animate-pulse"></div>
    <div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-violet-500/10 rounded-full blur-3xl animate-pulse" style="animation-delay: 1s"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-indigo-500/5 rounded-full blur-3xl"></div>
  </div>

  <!-- Content -->
  <div class="relative z-10 max-w-4xl mx-auto px-4 sm:px-6 text-center">
    <!-- Profile Photo -->
    <div class="mb-8 flex justify-center animate-fade-in">
      <div class="relative">
        <div class="w-32 h-32 sm:w-40 sm:h-40 rounded-full overflow-hidden border-2 border-white/10
                    shadow-2xl shadow-blue-500/10 ring-4 ring-blue-500/5">
          <img src="/images/profile.png" [alt]="env.fullName"
               class="w-full h-full object-cover" />
        </div>
        <!-- Status dot -->
        <div class="absolute bottom-2 right-2 w-4 h-4 rounded-full bg-green-400 border-2 border-[#0a0f1e] animate-pulse"></div>
      </div>
    </div>

    <!-- Greeting -->
    <p class="text-sm sm:text-base font-medium text-blue-400 tracking-widest uppercase mb-4 animate-fade-in">
      {{ t.t('hero.greeting') }}
    </p>

    <!-- Name -->
    <h1 class="text-5xl sm:text-6xl md:text-7xl lg:text-8xl font-black mb-6 leading-tight animate-fade-in-up">
      <span class="bg-gradient-to-r from-white via-blue-100 to-white bg-clip-text text-transparent">
        {{ env.fullName }}
      </span>
    </h1>

    <!-- Typewriter Title -->
    <div class="mb-6 animate-fade-in-up" style="animation-delay: 0.2s">
      <h2 class="text-2xl sm:text-3xl md:text-4xl font-bold text-white h-[1.3em]">
        <span>{{ displayText() }}</span><span class="typewriter-cursor text-blue-400">|</span>
      </h2>
    </div>

    <!-- Title Badges -->
    <div class="flex flex-wrap items-center justify-center gap-3 mb-6 animate-fade-in-up" style="animation-delay: 0.3s">
      @for (title of titles(); track title) {
        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full border border-white/10 bg-white/5 backdrop-blur-sm">
          <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
          <span class="text-sm font-medium text-slate-300">{{ title }}</span>
        </div>
      }
    </div>

    <!-- Subtitle -->
    <p class="text-lg sm:text-xl text-slate-400 max-w-2xl mx-auto mb-10 leading-relaxed animate-fade-in-up" style="animation-delay: 0.4s">
      {{ t.t('hero.subtitle') }}
    </p>

    <!-- CTAs -->
    <div class="flex flex-col sm:flex-row items-center justify-center gap-4 animate-fade-in-up" style="animation-delay: 0.6s">
      <a [routerLink]="['/', t.lang(), 'repos']"
         class="group px-8 py-3.5 bg-gradient-to-r from-blue-600 to-violet-600 rounded-xl text-white font-semibold
                hover:from-blue-500 hover:to-violet-500 transition-all duration-300 shadow-lg shadow-blue-500/20
                hover:shadow-blue-500/40 hover:-translate-y-0.5">
        {{ t.t('hero.cta_projects') }}
        <span class="inline-block ml-2 group-hover:translate-x-1 transition-transform">→</span>
      </a>
      <a [routerLink]="['/', t.lang(), 'contact']"
         class="px-8 py-3.5 border border-white/10 bg-white/5 rounded-xl text-white font-semibold
                hover:bg-white/10 hover:border-white/20 transition-all duration-300 backdrop-blur-sm
                hover:-translate-y-0.5">
        {{ t.t('hero.cta_contact') }}
      </a>
    </div>
  </div>
</section>
